name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
      - name: Test
        run: go test -race -count=1 ./...
      - name: Build
        run: go build -o /dev/null ./cmd/github-subdomains
